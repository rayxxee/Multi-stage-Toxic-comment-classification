random_seed: 42

paths:
  raw_data: "data/raw/train.csv"
  processed_binary: "data/processed/binary_dataset.csv"
  processed_multi: "data/processed/multi_dataset.csv"
  model_output: "models/"

preprocessing:
  regex_pattern: "[^a-z0-9 ]"
  min_text_length: 1

training:
  test_size: 0.2
  # Max samples to use for training (set to null for full dataset)
  # Recommended: 20000 for DeBERTa to keep training time reasonable
  max_samples: null
  max_samples_deberta: 20000

# ─── Pipeline thresholds (edit freely) ───────────────────────────────────────
thresholds:
  # Model 1: texts with P(safe) >= this are labelled safe and exit pipeline
  SAFE_THRESHOLD: 0.90
  # Fasttext threshold: Set to 0.0 for binary fallback (as it takes everything that Gatekeeper fails)
  FASTTEXT_THRESHOLD: 0.0

# ─── Pipeline stage order (swap names to reorder models) ─────────────────────
# Valid stage names: gatekeeper_lr | fasttext | deberta
pipeline:
  stage_order:
    - gatekeeper_lr
    - fasttext
    - deberta

# ─── Per-model hyper-params ──────────────────────────────────────────────────
model_params:
  gatekeeper_lr:
    tfidf_max_features: 50000
    tfidf_ngram_range: [1, 2]
    lr_max_iter: 1000
    lr_C: 1.0

  fasttext:
    lr: 0.1
    epoch: 50
    wordNgrams: 2      # bigrams are usually optimal for speed/accuracy trade-off
    minn: 3            # subword min char n-gram
    maxn: 5            # subword max char n-gram (5 is standard)
    dim: 100
    loss: hs           # Hierarchical softmax is often better for binary text classification

  deberta:
    model_name: "microsoft/deberta-v3-small"
    max_length: 256
    batch_size: 16
    num_epochs: 3
    learning_rate: 2.0e-5

# ─── Class label mapping ─────────────────────────────────────────────────────
labels:
  binary:
    0: "not_safe"
    1: "safe"
  multiclass:
    0: "hate_speech"
    1: "offensive"
    2: "safe"
